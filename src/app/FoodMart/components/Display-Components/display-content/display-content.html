<div class="tab-content" id="nav-tabContent">
    <div class="tab-pane fade show active" id="nav-all" role="tabpanel" aria-labelledby="nav-all-tab">
        <!-- <div class="product-grid row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5"> -->
        <div class="product-grid">

            @for(item of items; track item.id; let i = $index)
            {
                <div class="col">
                <div class="product-item">
                    @if(item.isAvail)
                    {
                        <span class="badge bg-success position-absolute m-3" style="text-align: center;">A</span>
                    }

                    @else
                    {
                        <span class="badge bg-danger position-absolute m-3" style="text-align: center;">NA</span>
                    }

                    @if(item.isHype)
                    {
                        <a href="#" class="btn-wishlist-hyped">
                            <!-- <svg width="24" height="24"><use xlink:href="#heart"></use></svg> -->
                            <img width="20" height="20" src="assets/svg/heart-alt-svgrepo-com.svg" alt="">
                        </a>
                    }

                    @else 
                    {
                        <a href="#" class="btn-wishlist">
                            <!-- <svg width="24" height="24"><use xlink:href="#heart"></use></svg> -->
                            <img width="20" height="20" src="assets/svg/heart-alt-svgrepo-com.svg" alt="">
                        </a>
                    }
                    
                    @if(item.isImage)
                    {
                        <figure>
                          <a href="index.html" title="Product Title">
                            <img [src]="item.imagesrc"  class="tab-image">
                          </a>
                        </figure>
                    }

                    @else
                    {
                        <figure>
                          <a href="index.html" title="Product Title">
                            <img src="assets/images/404-image"  class="tab-image">
                          </a>
                        </figure>
                    }
                    
                    <h3>{{item.title}}</h3>
                    <span class="qty">{{item.Ton}}</span>
                    <span class="rating">
                        <!-- <svg width="24" height="24" class="text-primary"><use xlink:href="#star-solid"></use>
                        </svg>  -->
                        <img class="text-primary" width="24" height="24" src="assets/svg/star-mark-svgrepo-com.svg" alt="">
                        {{item.star}}
                    </span>
                    <span class="price">{{item.rupee}}</span>
                    <div class="d-flex align-items-center justify-content-between">
                      <div class="input-group product-qty">
                          <span class="input-group-btn">
                              <button type="button" class="quantity-left-minus btn btn-danger btn-number" data-type="minus">
                                <img width="16" height="16" src="assets/svg/thumbs-up.svg" class="thumbsup">
                              </button>
                          </span>
                          <input type="text" id="quantity" name="quantity" class="form-control input-number" value="1">
                          <span class="input-group-btn">
                              <button type="button" class="quantity-left-minus btn btn-danger btn-number" data-type="minus">
                                <img width="16" height="16" src="assets/svg/thumbs-down.svg" class="thumbsdown">
                              </button>
                          </span>
                      </div>
                        <a href="#" class="nav-link">View More
                            <!-- <i class="fa fa-shopping-cart"></i> -->
                            <!-- <iconify-icon icon="uil:shopping-cart">color: #FFC43F; -->
                        </a>
                    </div>
                </div>
                </div>
            }
            
        </div>  
    </div>
</div>
