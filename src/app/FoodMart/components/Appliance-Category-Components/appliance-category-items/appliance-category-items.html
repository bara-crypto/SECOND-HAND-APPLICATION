<div class="col-md-12">
  <swiper-container [breakpoints]="{'640': { 'slidesPerView': 1 },'768': { 'slidesPerView': 2 },'1024': { 'slidesPerView': 3 }}"space-between="20" class="brand-carousel">
  <!-- <swiper-container slides-per-view="2" [breakpoints]="{'640': { 'slidesPerView': 1 },'768': { 'slidesPerView': 2 }}"space-between="30"class="brand-carousel"> -->
  <!-- <swiper-container  [breakpoints]="{'0': { 'slidesPerView': 1, 'spaceBetween': 10 },'768': { 'slidesPerView': 2, 'spaceBetween': 20 },  '1200': { 'slidesPerView': 2, 'spaceBetween': 30 }}" class="brand-carousel"> -->
  
    @for(item of products; track item.description)
    {
        <swiper-slide>
            <div class="card mb-3 p-3 rounded-4 shadow border-0">
              <div class="row g-0 align-items-center">
                <div class="col-4">
                  <img [src]="item.image" class="img-fluid rounded custom-card-img" [alt]="item.image">
                </div>
                <div class="col-8">
                  <div class="card-body py-0">
                    <h5 style="font-weight: 700;" class="text-muted mb-0">{{ item.name }}</h5>
                    <p class="card-title">{{ item.description }}</p>
                  </div>
                </div>
              </div>
            </div>
        </swiper-slide>
    }
  </swiper-container>
</div>
