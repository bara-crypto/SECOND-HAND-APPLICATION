
<article class="post-item card border-0 shadow-sm p-3">
  <div class="image-holder zoom-effect">
    <a href="#">
      <img [src]="blogs.image" alt="404-error" class="card-img-top">
    </a>
  </div>
  <div class="card-body">
    <div class="post-meta d-flex text-uppercase gap-3 my-2 align-items-center">
      <div class="meta-date"><svg width="16" height="16"><use xlink:href="#calendar"></use></svg>{{blogs.date}}</div>
      <!-- <div class="meta-categories"><svg width="16" height="16"><use xlink:href="#category"></use></svg>tips &amp; tricks</div> -->
    </div>
    <div class="post-header">
      <h3 class="post-title">
        <a href="#" class="text-decoration-none">{{blogs.name}}</a>
      </h3>
      <p>{{blogs.description}}</p>
    </div>
  </div>
</article>
